name: CI pipeline for ttcs

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  checks: write
  pull-requests: write
  statuses: write

jobs:
  unit_test_job:
    name: Run Unit Tests and Generate Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Run Unit Tests with Maven
        working-directory: ./backend
        run: mvn -B clean test
        
      - name: Generate JaCoCo Coverage Report
        if: always()
        working-directory: ./backend
        run: mvn jacoco:report
        
      - name: Calculate Coverage Percentage
        if: always()
        working-directory: ./backend
        run: |
          if [ -f target/site/jacoco/jacoco.csv ]; then
            awk -F"," '{ instructions += $4 + $5; covered += $5 } END { print covered, "/", instructions, " instructions covered"; print 100*covered/instructions "% covered" }' target/site/jacoco/jacoco.csv
          else
            echo "No JaCoCo report generated (no tests ran)"
          fi
        
      - name: Upload JaCoCo Coverage Report & Classes for Sonar
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: |
            backend/target/site/jacoco/
            backend/target/surefire-reports/
            backend/target/classes/
          retention-days: 7
          
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/target/surefire-reports/TEST-*.xml
          
      - name: Test Report Summary
        if: always()
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "- JaCoCo coverage report uploaded as artifact" >> $GITHUB_STEP_SUMMARY
          echo "- Test results available in artifacts" >> $GITHUB_STEP_SUMMARY

  helm_lint_job:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.12.0'
      - name: Lint Backend Helm Chart
        run: helm lint ./backend/helm
      - name: Lint Frontend Helm Chart
        run: helm lint ./frontend/helm

  tag_job:
    name: Get Image Tag
    runs-on: ubuntu-latest 
    if: >
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'pull_request'
    outputs:
      docker_tag: ${{ steps.calc_tag.outputs.tag }} 
    steps:
      - name: Tính toán Tag tự động
        id: calc_tag
        run: |
          SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha || github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref }}" == 'refs/heads/main' ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == 'pull_request' ]]; then
            echo "tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          fi

  build_job:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest 
    needs: [unit_test_job, tag_job]  
    if: >
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'pull_request'
    env:
      TAG: ${{ needs.tag_job.outputs.docker_tag }}
      REGISTRY_IMAGE: ${{ vars.DOCKER_REGISTRY }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Backend
        run: |
          docker pull $REGISTRY_IMAGE/ttcs-backend:$TAG || true
          docker build --cache-from $REGISTRY_IMAGE/ttcs-backend:$TAG -t $REGISTRY_IMAGE/ttcs-backend:$TAG ./backend
          docker push $REGISTRY_IMAGE/ttcs-backend:$TAG

      - name: Build and Push Frontend
        run: |
          docker pull $REGISTRY_IMAGE/ttcs-frontend:$TAG || true
          docker build --cache-from $REGISTRY_IMAGE/ttcs-frontend:$TAG -t $REGISTRY_IMAGE/ttcs-frontend:$TAG ./frontend
          docker push $REGISTRY_IMAGE/ttcs-frontend:$TAG

      - name: Cleanup Docker System
        if: always() 
        run: docker system prune -af

  integration_test_job:
    name: Run Integration Tests on Environment
    runs-on: ubuntu-latest
    needs: [tag_job, build_job]
    if: >
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'pull_request'
    env:
      TAG: ${{ needs.tag_job.outputs.docker_tag }}
      REGISTRY_IMAGE: ${{ vars.DOCKER_REGISTRY }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup Environment Variables
        run: |
          if [ -z "${{ secrets.ENV_FILE }}" ]; then
            echo "ERROR: ENV_FILE secret is not set in GitHub"
            exit 1
          fi
          
          echo "${{ secrets.ENV_FILE }}" > .env
          
          echo "TAG=$TAG" >> .env
          echo "DOCKER_REGISTRY=$REGISTRY_IMAGE" >> .env

      - name: Start services with Docker Compose
        run: |
          docker compose pull
          docker compose up -d --no-build
          
      - name: Wait and Check Logs
        run: |
          sleep 20
          docker compose ps
          docker compose logs --tail=200 backend || true

      - name: Check Health and Accessibility
        run: |
          curl -f http://localhost:80/ || (echo "Frontend unreachable" && exit 1)

      - name: Cleanup Docker System
        if: always()
        run: |
          docker compose down --volumes --rmi local
          docker system prune -a -f

  code_quality_scan:
    name: Code Quality Scan with SonarCloud
    runs-on: ubuntu-latest
    needs: [unit_test_job]
    continue-on-error: true
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 # Cần Java để chạy Maven
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download JaCoCo Report # Chỉ cần tải file XML báo cáo, không cần cả thư mục classes
        uses: actions/download-artifact@v4
        with:
          name: jacoco-coverage-report
          path: backend/target/site/jacoco/

      - name: Run SonarCloud Scan with Maven
        working-directory: ./backend
        run: |
          mvn compile sonar:sonar \
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  security_scan:
    name: Security Scan with Trivy
    runs-on: ubuntu-latest
    needs: [tag_job, build_job]
    if: >
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'pull_request'
    continue-on-error: true  
    env:
      TAG: ${{ needs.tag_job.outputs.docker_tag }}
      REGISTRY_IMAGE: ${{ vars.DOCKER_REGISTRY }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Run Trivy vulnerability scanner - Filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          
      - name: Run Trivy vulnerability scanner - Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY_IMAGE }}/ttcs-backend:${{ env.TAG }}'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

  update_config:
    name: Update Config
    needs: [tag_job, helm_lint_job, integration_test_job]
    runs-on: ubuntu-latest
    if: >
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'pull_request'
    env:
      TAG: ${{ needs.tag_job.outputs.docker_tag }}
      REPO_CONFIG: ${{ vars.REPO_CONFIG }} 
    steps:
      - name: Checkout Source Code (GitHub)
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Clone Config Repo (GitLab)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan gitlab.com >> ~/.ssh/known_hosts
          
          git clone ${REPO_CONFIG} Config
          
      - name: Update Config Tag for Staging
        run: |
          cd Config
          BACKEND_TARGET_FILE="app/spring/values-prod.yaml"
          yq -i '.backend.image.tag = strenv(TAG)' "$BACKEND_TARGET_FILE"

          FRONTEND_TARGET_FILE="app/react/values-prod.yaml"
          yq -i '.frontend.image.tag = strenv(TAG)' "$FRONTEND_TARGET_FILE"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add "$BACKEND_TARGET_FILE"
          git add "$FRONTEND_TARGET_FILE"
          git commit -m "CD: Update backend and frontend image tag to ${{ env.TAG }}" || echo "No changes to commit"
          git push origin main --force

  notify_success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [update_config]
    if: >
      always() && 
      !contains(needs.*.result, 'failure') && 
      !contains(needs.*.result, 'cancelled') &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'pull_request')
    steps:
      - name: Send Discord Notification - Success
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"✅ **PIPELINE SUCCESS!** 🚀\\n**Project:** ${{ github.repository }}\\n**${{ github.event_name == 'pull_request' && 'Pull Request' || 'Branch/Tag' }}:** ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref_name }}\\n**User:** ${{ github.actor }}\\n**Status:** 🟢 Thành công\\n👉 [Xem Pipeline](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}

  notify_fail:
    name: Notify Fail
    runs-on: ubuntu-latest
    needs: [update_config]
    if: >
      always() && 
      contains(needs.*.result, 'failure')
    steps:
      - name: Send Discord Notification - Failed
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"🚨 **PIPELINE FAILED!** 💥\\n**Project:** ${{ github.repository }}\\n**Branch/Tag:** ${{ github.ref_name }}\\n**User:** ${{ github.actor }}\\n**Status:** 🔴 Thất bại\\n👉 [Xem lỗi tại đây](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}