name: Build Tauri Mobile App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Init Android Project
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
        run: |
          npx tauri android init

      - name: Setup Android Signing
        run: |
          cd src-tauri/gen/android

          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties

          echo "${{ secrets.ANDROID_KEY_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
          echo "storeFile=$RUNNER_TEMP/upload-keystore.jks" >> keystore.properties

      - name: Patch Gradle Signing Config
        run: |
          python3 <<'PY'
          from pathlib import Path

          gradle_file = Path("src-tauri/gen/android/app/build.gradle.kts")
          text = gradle_file.read_text()

          # Xóa các import cũ để tránh bị duplicate
          lines = text.splitlines()
          lines = [
              line for line in lines
              if line.strip() not in {
                  "import java.io.FileInputStream",
                  "import java.util.Properties",
              }
          ]

          text = "\n".join(lines)

          # Thêm import lại đúng 1 lần
          text = "import java.io.FileInputStream\nimport java.util.Properties\n" + text

          signing_config = """
              signingConfigs {
                  create("release") {
                      val keystorePropertiesFile = rootProject.file("keystore.properties")
                      val keystoreProperties = Properties()

                      if (keystorePropertiesFile.exists()) {
                          keystoreProperties.load(FileInputStream(keystorePropertiesFile))
                      }

                      keyAlias = keystoreProperties["keyAlias"] as String
                      keyPassword = keystoreProperties["password"] as String
                      storeFile = file(keystoreProperties["storeFile"] as String)
                      storePassword = keystoreProperties["password"] as String
                  }
              }
          """

          if 'create("release")' not in text:
              text = text.replace("android {", "android {" + signing_config, 1)

          if 'signingConfig = signingConfigs.getByName("release")' not in text:
              text = text.replace(
                  'getByName("release") {',
                  'getByName("release") {\n            signingConfig = signingConfigs.getByName("release")',
                  1
              )

          gradle_file.write_text(text + "\n")
          PY

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npx tauri android build

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: app-android-apk
          path: |
            frontend/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim

      - name: Cache Rust Build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Build iOS App Simulator
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'http://localhost:3000' }}
          APPLE_DEVELOPMENT_TEAM: "1234567890"
        run: |
          npx tauri ios init
          npx tauri ios build --target aarch64-sim

      - name: Upload iOS App
        uses: actions/upload-artifact@v4
        with:
          name: app-ios-build
          path: frontend/src-tauri/gen/ios/build/**/*.app