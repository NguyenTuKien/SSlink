name: Backend CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: read
  checks: write
  pull-requests: write
  statuses: write

jobs:
  # Stage: Test - Unit Test với JaCoCo Coverage
  unit_test_coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Run Unit Tests with Maven
        working-directory: ./backend
        run: mvn -B clean test
        
      - name: Generate JaCoCo Coverage Report
        if: always()
        working-directory: ./backend
        run: mvn jacoco:report
        
      - name: Calculate Coverage Percentage
        if: always()
        working-directory: ./backend
        run: |
          if [ -f target/site/jacoco/jacoco.csv ]; then
            awk -F"," '{ instructions += $4 + $5; covered += $5 } END { print covered, "/", instructions, " instructions covered"; print 100*covered/instructions "% covered" }' target/site/jacoco/jacoco.csv
          else
            echo "No JaCoCo report generated (no tests ran)"
          fi
        
      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: |
            backend/target/site/jacoco/
            backend/target/surefire-reports/
          retention-days: 7
          
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/target/surefire-reports/TEST-*.xml
          
      - name: Test Report Summary
        if: always()
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "- JaCoCo coverage report uploaded as artifact" >> $GITHUB_STEP_SUMMARY
          echo "- Test results available in artifacts" >> $GITHUB_STEP_SUMMARY

  # Stage: Tag - Tính toán Docker Tag
  tag_job:
    runs-on: ubuntu-latest 
    needs: unit_test_coverage  # Chỉ tính tag nếu unit test pass
    if: >
      github.ref == 'refs/heads/dev' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/')
    outputs:
      docker_tag: ${{ steps.calc_tag.outputs.version }}
    steps:
      - name: Tính toán Tag tự động (Docker Metadata)
        id: calc_tag
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_REGISTRY }}/sslink-backend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,format=short,prefix=,enable=${{ github.ref == 'refs/heads/dev' }}

  # Stage: Build - Build và Push Docker Images
  build_job:
    runs-on: ubuntu-latest 
    needs: [unit_test_coverage, tag_job]  # Build sau khi unit test pass         
    if: >
      github.ref == 'refs/heads/dev' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/')
    env:
      TAG: ${{ needs.tag_job.outputs.docker_tag }}
      REGISTRY_IMAGE: ${{ secrets.DOCKER_REGISTRY }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Backend
        run: |
          docker pull $REGISTRY_IMAGE/backend:$TAG || true
          docker build --cache-from $REGISTRY_IMAGE/backend:$TAG -t $REGISTRY_IMAGE/backend:$TAG ./backend
          docker push $REGISTRY_IMAGE/backend:$TAG
      - name: Cleanup Docker System
        if: always() 
        run: docker system prune -af

  # Stage: Test - Integration Test với Docker Compose
  test_job:
    runs-on: ubuntu-latest
    needs: [unit_test_coverage, tag_job, build_job]  # Chạy sau khi build xong 
    
    if: >
      github.ref == 'refs/heads/dev' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/')
      
    env:
      # Lấy lại biến TAG từ tag_job
      TAG: ${{ needs.tag_job.outputs.docker_tag }}
      REGISTRY_IMAGE: ${{ secrets.DOCKER_REGISTRY }}
      
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # Tương đương before_script
      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Xử lý file .env từ GitHub Secrets
      - name: Setup Environment Variables
        run: |
          if [ -z "${{ secrets.ENV_FILE }}" ]; then
            echo "ERROR: ENV_FILE secret is not set in GitHub"
            exit 1
          fi
          
          # Ghi nội dung secret vào file .env
          echo "${{ secrets.ENV_FILE }}" > .env
          
          # Nối thêm biến TAG và REGISTRY cho docker-compose đọc
          echo "TAG=$TAG" >> .env
          echo "BACKEND_VERSION=$TAG" >> .env
          echo "DOCKER_REGISTRY=$REGISTRY_IMAGE" >> .env

      # Tương đương phần đầu của script
      - name: Start services with Docker Compose
        run: |
          docker compose pull
          docker compose up -d --no-build
          
      # Chờ và in log
      - name: Wait and Check Logs
        run: |
          sleep 20
          docker compose ps
          docker compose logs --tail=200 backend || true

      # Chạy kiểm tra Healthcheck
      - name: Check Backend Health
        run: |
          # Dùng luôn curl có sẵn trên máy ảo của GitHub cho tốc độ nhanh hơn
          curl -f http://localhost:8080/actuator/health || (echo "Backend unreachable" && exit 1)

      # Tương đương after_script (luôn chạy để dọn rác)
      - name: Cleanup Docker System
        if: always()
        run: |
          docker compose down --volumes --rmi local
          docker system prune -a -f

  # Stage: Scan - Security Scan với Trivy
  security_scan:
    runs-on: ubuntu-latest
    needs: [tag_job, build_job]
    if: >
      github.ref == 'refs/heads/dev' ||
      github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/')
    continue-on-error: true  # Tương đương allow_failure: true
    env:
      TAG: ${{ needs.tag_job.outputs.docker_tag }}
      REGISTRY_IMAGE: ${{ secrets.DOCKER_REGISTRY }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        
      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Run Trivy vulnerability scanner - Filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          
      - name: Run Trivy vulnerability scanner - Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY_IMAGE }}/backend:${{ env.TAG }}'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

  # Stage: Notify - Thông báo thành công lên Discord
  notify_success:
    runs-on: ubuntu-latest
    needs: [unit_test_coverage, tag_job, build_job, test_job, security_scan]
    if: >
      success() &&
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    steps:
      - name: Send Discord Notification - Success
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"✅ **DEPLOY SUCCESS!** 🚀\\n**Project:** ${{ github.repository }}\\n**Branch:** ${{ github.ref_name }}\\n**User:** ${{ github.actor }}\\n**Status:** 🟢 Thành công\\n👉 [Xem Pipeline](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}

  # Stage: Notify - Thông báo thất bại lên Discord
  notify_fail:
    runs-on: ubuntu-latest
    needs: [unit_test_coverage, tag_job, build_job, test_job, security_scan]
    if: >
      failure() &&
      (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    steps:
      - name: Send Discord Notification - Failed
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\": \"🚨 **PIPELINE FAILED!** 💥\\n**Project:** ${{ github.repository }}\\n**Branch:** ${{ github.ref_name }}\\n**User:** ${{ github.actor }}\\n**Status:** 🔴 Thất bại\\n👉 [Xem lỗi tại đây](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}
