services:
  database:
    image: postgres:alpine
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ttcs

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    entrypoint: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ttcs

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    restart: always
    env_file: .env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ttcs

  backend:
    build: ./backend
    image: ttcs-backend:latest
    restart: always
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health | grep UP"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - logs:/app/logs
    networks:
      - ttcs

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_PROXY_TARGET=http://backend:8080
    image: ttcs-frontend:latest
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ttcs

  cloudflare:
    image: cloudflare/cloudflared:2026.3.0
    restart: always
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    networks:
      - ttcs

volumes:
  logs:
  pg_data:
  redis_data:
  rabbitmq_data:

networks:
  ttcs:
    driver: bridge
