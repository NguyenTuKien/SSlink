apiVersion: v1
kind: ConfigMap
metadata:
  name: '{{ include "helm.fullname" . }}-configmap'
  labels:
    {{- include "helm.labels" . | nindent 4 }}
data:
  SPRING_PROFILES_ACTIVE: "{{ .Values.backend.environment.SPRING_PROFILES_ACTIVE }}"
  # Datasource
  SPRING_DATASOURCE_URL: "{{ .Values.backend.environment.SPRING_DATASOURCE_URL }}"
  SPRING_DATASOURCE_USERNAME: "{{ .Values.backend.environment.SPRING_DATASOURCE_USERNAME }}"
  # Redis
  SPRING_DATA_REDIS_HOST: "{{ .Values.backend.environment.SPRING_DATA_REDIS_HOST }}"
  SPRING_DATA_REDIS_PORT: "{{ .Values.backend.environment.SPRING_DATA_REDIS_PORT }}"
  # RabbitMQ
  SPRING_RABBITMQ_HOST: "{{ .Values.backend.environment.SPRING_RABBITMQ_HOST }}"
  SPRING_RABBITMQ_PORT: "{{ .Values.backend.environment.SPRING_RABBITMQ_PORT }}"
  SPRING_RABBITMQ_USERNAME: "{{ .Values.backend.environment.SPRING_RABBITMQ_USERNAME }}"
  SPRING_RABBITMQ_VIRTUAL_HOST: "{{ .Values.backend.environment.SPRING_RABBITMQ_VIRTUAL_HOST }}"
  SPRING_RABBITMQ_SSL_ENABLED: "{{ .Values.backend.environment.SPRING_RABBITMQ_SSL_ENABLED }}"
  # Mail
  SPRING_MAIL_HOST: "{{ .Values.backend.environment.SPRING_MAIL_HOST }}"
  SPRING_MAIL_PORT: "{{ .Values.backend.environment.SPRING_MAIL_PORT }}"
  SPRING_MAIL_USERNAME: "{{ .Values.backend.environment.SPRING_MAIL_USERNAME }}"
  # App
  CORS_ALLOWED_ORIGINS: "{{ .Values.backend.environment.CORS_ALLOWED_ORIGINS }}"
  SPRING_APP_SEEDER_ENABLED: "{{ .Values.backend.environment.SPRING_APP_SEEDER_ENABLED }}"
  # OAuth2
  SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_MICROSOFT_REDIRECT_URI: "{{ .Values.backend.environment.SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_MICROSOFT_REDIRECT_URI }}"
  SPRING_APP_OAUTH2_REDIRECT_URL: "{{ .Values.backend.environment.SPRING_APP_OAUTH2_REDIRECT_URL }}"
  # Device
  DEVICE_SECURITY_COOKIE_NAME: "{{ .Values.backend.environment.DEVICE_SECURITY_COOKIE_NAME }}"
  DEVICE_SECURITY_COOKIE_SECURE: "{{ .Values.backend.environment.DEVICE_SECURITY_COOKIE_SECURE }}"
  DEVICE_BINDING_TTL_MS: "{{ .Values.backend.environment.DEVICE_BINDING_TTL_MS }}"
  # JWT
  JWT_EXPIRATION_MS: "{{ .Values.backend.environment.JWT_EXPIRATION_MS }}"
  JWT_REFRESH_EXPIRATION_MS: "{{ .Values.backend.environment.JWT_REFRESH_EXPIRATION_MS }}"