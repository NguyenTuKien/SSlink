spring:
  main:
    banner-mode: "off"
    time-zone: Asia/Ho_Chi_Minh
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/dummy_db?prepareThreshold=0
    username: dummy_user
    password: dummy_password
    driver-class-name: org.postgresql.Driver
    hikari:
      max-lifetime: 900000
      idle-timeout: 600000
      keepalive-time: 120000
      connection-timeout: 30000
      validation-timeout: 5000
      minimum-idle: 2
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: true
    properties:
      hibernate.jdbc.time_zone: Asia/Ho_Chi_Minh

  jackson:
    time-zone: Asia/Ho_Chi_Minh

  data:
    redis:
      host: localhost
      port: 6379
      password: dummy_password

  rabbitmq:
    host: localhost
    port: 5672
    username: dummy_user
    password: dummy_password
    virtual-host: /
    ssl:
      enabled: false

  mail:
    host: smtp.example.com
    port: 587
    username: dummy@example.com
    password: dummy_password
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

  security:
    oauth2:
      client:
        registration:
          microsoft:
            client-id: dummy_client_id
            client-secret: dummy_client_secret
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - email
              - profile
              - User.Read
            authorization-grant-type: authorization_code
            client-name: Microsoft
        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: sub

  app:
    seeder:
      enabled: false
    oauth2:
      redirect:
        url: http://localhost:3000/oauth-success

jwt:
  secret: dummy_base64_encoded_secret_key_here_minimum_32_chars=
  expiration-ms: 3600000
  refresh-expiration-ms: 86400000

device:
  security:
    hmac-secret: dummy_hmac_secret_key_here_for_device_binding
    cookie-name: device_token
    cookie-secure: true
  binding:
    ttl-ms: 604800000

server:
  servlet:
    context-path: /api
  port: 8080
  forward-headers-strategy: framework

cors:
  allowed-origins: "*"

notification:
  attachment:
    dir: ./backend/storage/notifications
    max-size-bytes: 10485760

logging:
  level:
    root: warn
    ct01.n06.backend: info

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
