spring:
  config:
    import: "optional:file:.env[.properties]"
  main:
    banner-mode: "off"
    time-zone: Asia/Ho_Chi_Minh
  application:
    name: backend

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:postgres}?prepareThreshold=0
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      max-lifetime: ${DB_HIKARI_MAX_LIFETIME_MS:900000}
      idle-timeout: ${DB_HIKARI_IDLE_TIMEOUT_MS:600000}
      keepalive-time: ${DB_HIKARI_KEEPALIVE_TIME_MS:120000}
      connection-timeout: ${DB_HIKARI_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_HIKARI_VALIDATION_TIMEOUT_MS:5000}
      minimum-idle: ${DB_HIKARI_MIN_IDLE:2}
      maximum-pool-size: ${DB_HIKARI_MAX_POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: true
    properties:
      hibernate.jdbc.time_zone: Asia/Ho_Chi_Minh

  jackson:
    time-zone: Asia/Ho_Chi_Minh

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL_ENABLED:false}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_APP_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
      mail.smtp.connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
      mail.smtp.timeout: ${MAIL_SMTP_TIMEOUT:5000}
      mail.smtp.writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:5000}

  security:
    oauth2:
      client:
        registration:
          microsoft:
            client-id: ${MICROSOFT_CLIENT_ID}
            client-secret: ${MICROSOFT_CLIENT_SECRET}
            redirect-uri: ${OAUTH2_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
            scope:
              - openid
              - email
              - profile
              - User.Read
            authorization-grant-type: authorization_code
            client-name: Microsoft
        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            jwk-set-uri: https://login.microsoftonline.com/common/discovery/v2.0/keys
            user-info-uri: https://graph.microsoft.com/oidc/userinfo
            user-name-attribute: sub

app:
  seeder:
    enabled: ${APP_SEEDER_ENABLED:false}
  oauth2:
    redirect:
      url: ${OAUTH2_REDIRECT_URL:http://localhost:3000/oauth-success}
  response-cache:
    enabled: ${APP_RESPONSE_CACHE_ENABLED:true}
    ttl-seconds: ${APP_RESPONSE_CACHE_TTL_SECONDS:45}
    max-body-bytes: ${APP_RESPONSE_CACHE_MAX_BODY_BYTES:524288}

jwt:
  secret: ${JWT_SECRET:GenerateYourOwnSecureSecretKeyHereMinimum32Chars}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400}

device:
  security:
    hmac-secret: ${DEVICE_HMAC_SECRET:ChangeThisHMACSecretKeyForProduction}
    cookie-name: ${DEVICE_COOKIE_NAME:device_token}
    cookie-secure: ${DEVICE_COOKIE_SECURE:true}
  binding:
    ttl-ms: ${DEVICE_BINDING_TTL_MS:604800000}

server:
  servlet:
    context-path: /api
  port: 8080
  forward-headers-strategy: framework

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

notification:
  attachment:
    dir: ${NOTIFICATION_ATTACHMENT_DIR:./backend/storage/notifications}
    max-size-bytes: ${NOTIFICATION_ATTACHMENT_MAX_SIZE_BYTES:10485760}

face:
  integration:
    base-url: ${AI_FACE_SERVICE_BASE_URL:http://localhost:8000}
    auth-token: ${AI_FACE_SERVICE_AUTH_TOKEN:}
    model-name: ${AI_FACE_MODEL_NAME:Facenet512}
    detector-backend: ${AI_FACE_DETECTOR_BACKEND:retinaface}
    enforce-detection: ${AI_FACE_ENFORCE_DETECTION:true}
    connect-timeout-ms: ${AI_FACE_CONNECT_TIMEOUT_MS:8000}
    read-timeout-ms: ${AI_FACE_READ_TIMEOUT_MS:15000}
    match-threshold: ${AI_FACE_MATCH_THRESHOLD:0.72}
    min-probe-quality-score: ${AI_FACE_MIN_PROBE_QUALITY_SCORE:0.45}
    quality-strict-threshold: ${AI_FACE_QUALITY_STRICT_THRESHOLD:0.65}
    low-quality-threshold-boost: ${AI_FACE_LOW_QUALITY_THRESHOLD_BOOST:0.04}
    min-confidence-gap: ${AI_FACE_MIN_CONFIDENCE_GAP:0.03}
    max-probe-faces-per-frame: ${AI_FACE_MAX_PROBE_FACES_PER_FRAME:6}
    require-liveness: ${AI_FACE_REQUIRE_LIVENESS:false}
    max-image-size-bytes: ${AI_FACE_MAX_IMAGE_SIZE_BYTES:2097152}
    profile-cache-ttl-seconds: ${AI_FACE_PROFILE_CACHE_TTL_SECONDS:300}
    session-candidate-cache-ttl-seconds: ${AI_FACE_SESSION_CANDIDATE_CACHE_TTL_SECONDS:90}

logging:
  level:
    root: warn
    ct01.n06.backend: info

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
